<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Dino Pro</title>
   <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a0f2e">
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;

        overflow: hidden;
        color: white;
      }

      body::after {
        content: "";
        position: fixed;
        inset: 0;
        background: radial-gradient(
          circle at center,
          rgba(255, 255, 255, 0.05),
          transparent 70%
        );
        pointer-events: none;
      }

      #game {
        position: relative;
        width: 100vw;
        height: 100vh;
        border: 2px solid rgba(255, 255, 255, 0.1);
        border-radius: 20px;
        overflow: hidden;
      }

      .hud {
        position: absolute;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        text-align: center;
      }

      .left,
      .right {
        position: absolute;
        top: 20px;
        padding: 12px 20px;
        border-radius: 12px;
        background: rgba(20, 10, 50, 0.5);
        backdrop-filter: blur(8px);
        box-shadow: 0 0 20px rgba(255, 100, 255, 0.2);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      .left {
        left: 20px;
      }

      .right {
        right: 20px;
        text-align: right;
      }

      .title {
        font-size: 28px;
        font-weight: bold;
      }

      .title span {
        color: #ffb347;
        text-shadow: 0 0 10px #ffb347;
      }

      .left div,
      .right div {
        margin-bottom: 5px;
        opacity: 0.9;
      }

      #score {
        font-size: 50px;
        font-weight: bold;
        letter-spacing: 4px;
        text-shadow: 0 0 10px rgba(255, 255, 255, 0.6);
      }

      canvas {
        display: block;
      }
      #menu {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.9);

  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;

  z-index: 10;
}

#menu img {
  width: 120px;
  margin: 10px;
  cursor: pointer;
  transition: 0.2s;
}

#menu img:hover {
  transform: scale(1.1);
}
    </style>
  </head>

  <body>
    <div id="game">
      <div id="menu">
  <h2>Escolha seu Dino</h2>

  <img src="dino1.png" onclick="selectSkin('verde')">
  <img src="dinorosanew.png" onclick="selectSkin('rosa')">
  <img src="dinoazulnew.png" onclick="selectSkin('azul')">
  <p>Desenvolvido por Ester</p>
</div>
      <div class="left">
        <div class="title">DINO <span>PRO MAX</span></div>
        <div>ESPAÇO = pular</div>
        <div>ABAIXAR = seta abaixar</div>
      </div>

      <div class="hud">
        <div id="score">00000</div>
      </div>

      <div class="right">
        <div>Velocidade</div>
        <div id="speed">1</div>
      </div>

      <canvas id="canvas"></canvas>
    </div>

    <script>
      let gameStarted = false;
      let flyingEvent = false;
      let flyingEnemies = [];
      let lastEventScore = 0;
      let isDucking = false;
      const backgroundImg = new Image(); //fundo
      backgroundImg.src = "fundo1.png";

      const cactusBig = new Image();
      const cactusSmall = new Image();
      cactusBig.src = "cacto1.png";
      cactusSmall.src = "cacto2.png";
const skins = {
  verde: {
    run: "./dino1.png",
    duck: "dinoacocado1.png"
  },
  rosa: {
    run: "dinorosanew.png",
    duck: "dinoacocadorosanew.png"
  },
  azul: {
    run: "dinoazulnew.png",
    duck: "dinoazulacocadonew.png"
  }
};

let currentSkin = "verde";

let dinoImg = new Image();
let dinoDuckImg = new Image();


function loadSkin(name) {
  currentSkin = name;

  dinoImg.src = skins[name].run;
  dinoDuckImg.src = skins[name].duck;
}


loadSkin("verde");




      const birdImg = new Image();
      birdImg.src = "voador.png";

      const groundHeight = 200;
      let gameOver = false;
      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d");

      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;

      let gravity = 0.8;
      let gameSpeed = 6;
      let score = 0;

      const player = {
        x: 100,
        y: 0,
        w: 180,
        h: 180,
        vy: 0,
        jumping: false,

        hitboxOffsetX: 30,
        hitboxOffsetY: 20,
        hitboxW: 120,
        hitboxH: 140,
      };
      player.y = canvas.height - groundHeight - player.h + 18;

      let obstacles = [];

      function spawnObstacle() {
        const isBig = Math.random() > 0.5;

        const img = isBig ? cactusBig : cactusSmall;

        const width = isBig ? 120 : 90;
        const height = 160;

        const offsetY = 15;

        const hitboxW = isBig ? 80 : 55;

        const hitboxOffsetX = isBig ? 30 : 20;

        obstacles.push({
          x: canvas.width,
          y: canvas.height - groundHeight - height + offsetY,

          w: hitboxW,
          h: height,

          hitboxOffsetX,

          drawW: width,
          drawH: height,

          img,
        });
      }
      let spawnTimer = 0;
      let spawnDelay = 100;

      function update() {
        if (isDucking) {
          player.hitboxH = 80;
          player.hitboxOffsetY = 60;
        } else {
          player.hitboxH = 140;
          player.hitboxOffsetY = 20;
        }

        spawnTimer++;

        if (spawnTimer > (flyingEvent ? spawnDelay * 1.8 : spawnDelay)) {
          spawnObstacle();
          spawnTimer = 0;

          spawnDelay = Math.max(70, 160 - gameSpeed * 4);
        }

        player.vy += gravity;
        player.y += player.vy;

        if (player.y >= canvas.height - groundHeight - player.h + 18) {
          player.y = canvas.height - groundHeight - player.h + 18;
          player.jumping = false;
        }

        obstacles.forEach((o) => {
          o.x -= gameSpeed;
        });

        flyingEnemies.forEach((b) => {
          b.x -= gameSpeed + 2;

          b.angle += 0.05;
          b.y = b.baseY + Math.sin(b.angle) * b.amplitude;
        });

        obstacles.forEach((o) => {
          const px = player.x + player.hitboxOffsetX;
          const py = player.y + player.hitboxOffsetY;
          const ox = o.x + (o.hitboxOffsetX || 0);

          if (
            px < ox + o.w &&
            px + player.hitboxW > ox &&
            py < o.y + o.h &&
            py + player.hitboxH > o.y
          ) {
            gameOver = true;
          }
        });

        flyingEnemies.forEach((b) => {
          const px = player.x + player.hitboxOffsetX;
          const py = player.y + player.hitboxOffsetY;

          if (
            px < b.x + b.w - 25 &&
            px + player.hitboxW > b.x + 25 &&
            py < b.y + b.h - 20 &&
            py + player.hitboxH > b.y + 20
          ) {
            gameOver = true;
          }
        });

        if (score - lastEventScore >= 1000) {
          startFlyingEvent();
          lastEventScore = score;
        }

        flyingEnemies = flyingEnemies.filter((b) => b.x > -100);
        obstacles = obstacles.filter((o) => o.x > -50);

        score++;
        document.getElementById("score").innerText = score
          .toString()
          .padStart(5, "0");

        document.getElementById("speed").innerText = gameSpeed.toFixed(1);

        gameSpeed = 6 + score * 0.005;

        if (gameOver) return;
      }
      function drawBackground() {
        ctx.drawImage(backgroundImg, 0, 0, canvas.width, canvas.height);
      }
      function drawPlayer() {
  let img = dinoImg;
  let drawY = player.y;

  if (isDucking) {
    img = dinoDuckImg;

    
    const diff = player.h - 160; 
    drawY = player.y + diff;
  }

  ctx.drawImage(img, player.x, drawY, player.w, player.h);
}
      function drawObstacles() {
        obstacles.forEach((o) => {
          ctx.drawImage(o.img, o.x, o.y, o.drawW, o.drawH);
        });
      }

      function drawGround() {
        const y = canvas.height - groundHeight;

        ctx.fillStyle = "#4a2416";
        ctx.fillRect(0, y, canvas.width, groundHeight);

        ctx.fillStyle = "#8b4a2b";
        ctx.fillRect(0, y, canvas.width, 25);

        ctx.fillStyle = "#2a140d";
        ctx.fillRect(0, y + 25, canvas.width, 5);

        ctx.fillStyle = "#2d140c";

        for (let row = 0; row < 4; row++) {
          for (let x = 0; x < canvas.width; x += 60) {
            ctx.fillRect(
              x + (row % 2 === 0 ? 0 : 30),
              y + 40 + row * 35,
              40,
              10
            );
          }
        }

        ctx.strokeStyle = "#1a0d08";

        for (let x = 0; x < canvas.width; x += 80) {
          ctx.beginPath();
          ctx.moveTo(x, y + 25);
          ctx.lineTo(x + 20, y + 80);
          ctx.stroke();
        }
      }
    function loop() {
  drawBackground();

  if (!gameStarted) {
    requestAnimationFrame(loop);
    return;
  }

  drawGround();
  drawPlayer();
  drawObstacles();
  drawBirds();

  if (gameOver) {
    drawGameOver();
  } else {
    update();
  }

  requestAnimationFrame(loop);
}

      document.addEventListener("keydown", (e) => {
        if (e.code === "Space" && !player.jumping && !gameOver) {
          player.vy = -25;
          player.jumping = true;
        }

        if (e.code === "KeyR" && gameOver) {
          document.location.reload();
        }

        if (e.code === "ArrowDown") {
          isDucking = true;
        }
      });

      document.addEventListener("keyup", (e) => {
        if (e.code === "ArrowDown") {
          isDucking = false;
        }
      });

      function drawGameOver() {
        if (!gameOver) return;

        ctx.fillStyle = "rgba(0,0,0,0.5)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = "#fff";
        ctx.font = "50px Arial";
        ctx.textAlign = "center";
        ctx.fillText("GAME OVER", canvas.width / 2, canvas.height / 2);

        ctx.font = "20px Arial";
        ctx.fillText(
          "Pressione R para reiniciar",
          canvas.width / 2,
          canvas.height / 2 + 40
        );
      }

      function spawnBird() {
        const types = [
          "high", // abaixar
          "middle", // zigzag
          "low", // pular (igual cacto)
        ];

        const type = types[Math.floor(Math.random() * types.length)];

        let baseY;
        let amplitude;

        if (type === "high") {
          baseY = canvas.height - groundHeight - 260;
          amplitude = 20;
        } else if (type === "middle") {
          baseY = canvas.height - groundHeight - 200;
          amplitude = 40;
        } else {
          baseY = canvas.height - groundHeight - 120;
          amplitude = 10;
        }

        flyingEnemies.push({
          x: canvas.width,
          y: baseY,

          baseY: baseY,
          angle: 0,
          amplitude: amplitude,

          w: 100,
          h: 80,
        });
      }

      function drawBirds() {
        flyingEnemies.forEach((b) => {
          ctx.drawImage(birdImg, b.x, b.y, b.w, b.h);
        });
      }
      function startFlyingEvent() {
        flyingEvent = true;

        flyingEnemies = [];

        let birdInterval = setInterval(() => {
          if (!flyingEvent) {
            clearInterval(birdInterval);
            return;
          }
          if (flyingEnemies.length < 3) {
            spawnBird();
          }
        }, 1200);

        setTimeout(endFlyingEvent, 6000);
      }
      function endFlyingEvent() {
        flyingEvent = false;
      }
      function selectSkin(name) {
  loadSkin(name);

  gameStarted = true;

  document.getElementById("menu").style.display = "none";
}

      loop();
      if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("./sw.js")
    .then(() => console.log("PWA pronto 🚀"))
    .catch(err => console.log(err));
}
    </script>
  </body>
</html>
